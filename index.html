<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda AI | Llama 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .typing { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: white; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body class="bg-zinc-950 text-white h-screen flex flex-col font-sans">
    <header class="p-4 border-b border-zinc-800 text-center font-bold tracking-widest text-blue-500">GARUDA AI</header>
    
    <main id="chatArea" class="flex-1 overflow-y-auto p-4 space-y-4"></main>

    <form id="chatForm" class="p-4 bg-zinc-900 border-t border-zinc-800">
        <div class="flex gap-2 max-w-3xl mx-auto">
            <input type="text" id="userInput" class="flex-1 bg-zinc-800 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="Tanya sesuatu ke Llama 3..." required>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-bold transition">Kirim</button>
        </div>
    </form>

    <script>
        const chatArea = document.getElementById('chatArea');
        const form = document.getElementById('chatForm');
        const input = document.getElementById('userInput');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value;
            chatArea.innerHTML += `<div class="p-3 bg-zinc-800 rounded-lg max-w-[80%] self-end ml-auto"><b>Anda:</b> ${text}</div>`;
            input.value = '';
            
            const loading = document.createElement('div');
            loading.innerHTML = `<div class="p-3 bg-zinc-800 rounded-lg">Garuda: <span class="typing"></span></div>`;
            chatArea.appendChild(loading);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                loading.innerHTML = `<div class="p-3 bg-blue-900/20 border border-blue-800 rounded-lg"><b>Garuda:</b> ${data.reply}</div>`;
            } catch {
                loading.innerHTML = `<div class="text-red-500">Error: Gagal terhubung ke server.</div>`;
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        };
    </script>
</body>
</html>
