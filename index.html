<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Garuda AI - Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .typing { width: 6px; height: 6px; background: #60a5fa; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body class="text-white h-screen flex flex-col items-center">
    <header class="w-full p-6 text-center text-sm tracking-widest text-zinc-500">GARUDA AI v2.0</header>
    
    <main id="chatArea" class="w-full max-w-2xl flex-1 overflow-y-auto p-6 space-y-6 scrollbar-hide"></main>

    <form id="chatForm" class="w-full max-w-2xl p-6">
        <div class="glass rounded-2xl p-2 flex items-center">
            <input type="text" id="userInput" class="flex-1 bg-transparent p-3 outline-none" placeholder="Tanya sesuatu..." required>
            <button class="px-5 py-2 bg-blue-600 rounded-xl hover:bg-blue-500 transition">Kirim</button>
        </div>
    </form>

    <script>
        const chatArea = document.getElementById('chatArea');
        let memory = JSON.parse(localStorage.getItem('user_memory')) || [];

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value;
            if(!message) return;
            
            chatArea.innerHTML += `<div class="text-right text-zinc-300">${message}</div>`;
            input.value = '';

            const loading = document.createElement('div');
            loading.innerHTML = `<div class="typing"></div>`;
            chatArea.appendChild(loading);

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, memory })
            });
            const data = await res.json();
            
            loading.remove();
            chatArea.innerHTML += `<div class="text-blue-200 leading-relaxed">${data.reply}</div>`;
            
            // Simpan ke memori lokal
            memory.push({ role: 'user', content: message }, { role: 'assistant', content: data.reply });
            localStorage.setItem('user_memory', JSON.stringify(memory.slice(-10))); // Simpan 10 chat terakhir
        }
        document.getElementById('chatForm').onsubmit = (e) => { e.preventDefault(); sendMessage(); };
    </script>
</body>
</html>
