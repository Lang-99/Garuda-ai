<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e4e4e7; }
        .chat-bubble { max-width: 80%; }
        .bg-garuda { background: linear-gradient(135deg, #1e3a8a 0%, #000 100%); }
    </style>
</head>
<body class="h-[100dvh] flex flex-col">

    <header class="p-4 border-b border-zinc-800 text-center font-bold text-xl tracking-widest text-blue-500">
        GARUDA AI
    </header>

    <main id="chatArea" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="text-center mt-10 text-zinc-500 italic">Mulai percakapan dengan Garuda AI...</div>
    </main>

    <form id="chatForm" class="p-4 border-t border-zinc-800 bg-zinc-950">
        <div class="flex gap-2">
            <input type="text" id="userInput" 
                class="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg p-3 outline-none focus:border-blue-500" 
                placeholder="Ketik pesan..." required>
            <button type="submit" class="bg-blue-600 px-6 py-2 rounded-lg font-bold hover:bg-blue-700">Kirim</button>
        </div>
    </form>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="chat-bubble p-3 rounded-xl ${sender === 'user' ? 'bg-blue-600' : 'bg-zinc-800'}">
                    ${text}
                </div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = userInput.value.trim();
            if (!query) return;

            appendMessage(query, 'user');
            userInput.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: query }] })
                });

                const data = await response.json();
                
                if (response.ok) {
                    appendMessage(data.choices[0].message.content, 'ai');
                } else {
                    appendMessage("Error: " + (data.error || "Gagal menghubungi server"), 'ai');
                }
            } catch (err) {
                appendMessage("Koneksi terputus: " + err.message, 'ai');
            }
        });
    </script>
</body>
</html>
