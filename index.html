<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Garuda AI | System Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0a0a0a; --bg2: #111111; --surface: rgba(255,255,255,0.04); --surface2: rgba(255,255,255,0.07); --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14); --accent: #e8ff47; --accent2: #7df9ff; --roblox-orange: #ff6b35; --text: #f0f0f0; --text2: #888; --text3: #555; --radius: 16px; --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; }
        body { font-family: var(--sans); background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; position: relative; }
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
        .bg-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; opacity: 0.12; background: radial-gradient(circle, var(--accent2), transparent 70%); top: -200px; right: -200px; }
        .app-wrapper { position: relative; z-index: 1; width: 100%; max-width: 720px; height: 100%; display: flex; flex-direction: column; }
        header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); flex-shrink: 0; }
        .logo-group { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text { display: flex; flex-direction: column; gap: 1px; }
        .logo-name { font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--text); }
        .logo-status { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text3); font-family: var(--mono); }
        .status-dot { width: 5px; height: 5px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 6px #4ade80; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .icon-btn:hover { background: var(--surface2); color: var(--text); }
        .model-tag { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-family: var(--mono); font-size: 10px; color: var(--text2); }
        
        #chatArea { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }
        .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 40px 20px; }
        .welcome-logo { width: 64px; height: 64px; border-radius: 18px; overflow: hidden; border: 1px solid var(--border2); }
        .welcome-logo img { width: 100%; height: 100%; object-fit: cover; }
        .welcome-title { font-family: var(--mono); font-size: 22px; font-weight: 700; text-align: center; }
        
        /* PANEL KONEKSI RADAR SCREEN ROGARUDA */
        .rogaruda-panel { width: 100%; max-width: 440px; padding: 16px; border-radius: 12px; border: 1px solid rgba(255, 107, 53, 0.2); background: rgba(255, 107, 53, 0.03); display: flex; flex-direction: column; gap: 12px; align-items: center; margin-top: 10px; }
        .rogaruda-btn { background: var(--roblox-orange); color: #fff; font-family: var(--mono); font-size: 11px; font-weight: 700; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; width: 100%; justify-content: center; }
        .status-text { font-family: var(--mono); font-size: 11px; color: var(--text2); }
        #previewVideo { width: 100%; height: 150px; background: #000; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); display: none; }

        .msg-row { display: flex; gap: 12px; }
        .msg-row.user { flex-direction: row-reverse; }
        .msg-avatar { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
        .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .msg-bubble { max-width: calc(100% - 50px); display: flex; flex-direction: column; gap: 4px; }
        .msg-name { font-family: var(--mono); font-size: 10px; color: var(--text3); }
        .msg-content { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.65; word-break: break-word; }
        .msg-row.ai .msg-content { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 4px 12px 12px 12px; }
        .msg-row.user .msg-content { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 12px 4px 12px 12px; }
        .typing-indicator { display: flex; gap: 4px; padding: 14px 16px; }
        
        footer { padding: 12px 16px 20px; flex-shrink: 0; border-top: 1px solid var(--border); background: #0a0a0a; }
        .toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; overflow-x: auto; scrollbar-width: none; }
        .tool-chip { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-family: var(--mono); font-size: 10px; color: var(--text2); cursor: pointer; white-space: nowrap; }
        .tool-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.05); }
        .tool-chip[data-mode="rogaruda"].active { border-color: var(--roblox-orange); color: var(--roblox-orange); background: rgba(255,107,53,0.05); }
        .input-box { display: flex; align-items: flex-end; gap: 10px; padding: 10px 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); }
        #userInput { flex: 1; background: transparent; border: none; outline: none; font-family: var(--sans); font-size: 14px; color: var(--text); resize: none; max-height: 120px; }
        #sendBtn { width: 34px; height: 34px; border-radius: 9px; border: none; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .input-footer { display: flex; justify-content: flex-end; padding-top: 4px; }
        .char-count { font-family: var(--mono); font-size: 9px; color: var(--text3); }
        
        /* SIDEBAR (RIWAYAT & MEMORI UTAL) */
        .sidebar { position: fixed; top: 0; right: 0; width: 280px; height: 100%; background: #111; border-left: 1px solid var(--border); z-index: 100; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .sidebar-overlay.open { opacity: 1; pointer-events: all; }
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; }
        .sidebar-section { display: flex; flex-direction: column; gap: 8px; }
        .sidebar-label { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; }
        .sidebar-item { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .memory-count { margin-left: auto; font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(--surface2); }
        .history-container { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
        .history-item { font-size: 12px; padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); cursor: pointer; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); padding: 10px 18px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border2); font-family: var(--mono); font-size: 11px; opacity: 0; transition: all 0.2s; z-index: 200; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span style="font-family: var(--mono); font-size: 11px; color: var(--text2);">SISTEM INTEGRASI</span>
            <button class="icon-btn" id="closeSidebar">✕</button>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Memori Aktif</div>
            <div class="sidebar-item"><span class="si-icon">🧠</span> Blok Memori <span class="memory-count" id="memCount">0</span></div>
            <div class="sidebar-item" id="clearMemoryBtn"><span class="si-icon">🗑️</span> Hapus Memori Chat</div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Riwayat Percakapan</div>
            <div class="history-container" id="historyListContainer"></div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Sesi Eksport</div>
            <div class="sidebar-item" id="exportChat"><span class="si-icon">📤</span> Export ke TXT</div>
            <div class="sidebar-item" id="newChatBtn"><span class="si-icon">✨</span> Sesi Baru</div>
        </div>
    </div>

    <div class="app-wrapper">
        <header>
            <div class="logo-group">
                <div class="logo-icon"><img src="https://kappa.lol/8AK3HC"></div>
                <div class="logo-text">
                    <div class="logo-name">GARUDA AI</div>
                    <div class="logo-status"><div class="status-dot"></div><span>ONLINE</span></div>
                </div>
            </div>
            <div class="header-actions">
                <div class="model-tag">Llama-70b</div>
                <button class="icon-btn" id="menuBtn">☰</button>
            </div>
        </header>

        <div id="chatArea">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-logo"><img src="https://kappa.lol/8AK3HC"></div>
                <div class="welcome-title">Garuda AI Core</div>
                
                <div class="rogaruda-panel">
                    <div class="status-text">Status Screen Link: <span id="streamStatus" style="color:var(--text3)">OFFLINE</span></div>
                    <video id="previewVideo" autoplay playsinline muted></video>
                    <button class="rogaruda-btn" id="startCaptureBtn">🖥️ HUBUNGKAN SCREEN ROBLOX</button>
                </div>
            </div>
        </div>

        <footer>
            <div class="toolbar">
                <div class="tool-chip" data-mode="chat">CHAT</div>
                <div class="tool-chip active" data-mode="rogaruda">ROGARUDA</div>
                <div class="tool-chip" data-mode="code">KODE</div>
                <div class="tool-chip" data-mode="analyze">ANALISIS</div>
                <div class="tool-chip" data-mode="translate">TERJEMAH</div>
            </div>
            <div class="input-box">
                <textarea id="userInput" placeholder="Masukkan perintah..." rows="1" maxlength="4000"></textarea>
                <button id="sendBtn" disabled>▶</button>
            </div>
            <div class="input-footer">
                <span class="char-count" id="charCount">0 / 4000</span>
            </div>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const state = { 
            memory: JSON.parse(localStorage.getItem('garuda_mem')) || [], 
            sessions: JSON.parse(localStorage.getItem('garuda_sessions')) || [],
            mode: 'rogaruda', 
            typing: false 
        };

        let screenStream = null;
        const AVATAR_URL = "https://kappa.lol/8AK3HC";
        const chatArea = document.getElementById('chatArea');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const charCount = document.getElementById('charCount');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const memCount = document.getElementById('memCount');
        const historyListContainer = document.getElementById('historyListContainer');
        const startCaptureBtn = document.getElementById('startCaptureBtn');
        const previewVideo = document.getElementById('previewVideo');
        const streamStatus = document.getElementById('streamStatus');

        updateMemCount(); renderHistoryTabs();
        if (state.memory.length > 0) { welcomeScreen.style.display = 'none'; restoreMemory(); }

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
            const len = userInput.value.length;
            charCount.textContent = `${len} / 4000`;
            sendBtn.disabled = len === 0;
        });

        sendBtn.addEventListener('click', handleSend);

        document.querySelectorAll('.tool-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.tool-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active'); state.mode = chip.dataset.mode;
                userInput.focus();
            });
        });

        // ACTION BUTTON SCREEN CAPTURE ROGARUDA
        startCaptureBtn.addEventListener('click', async () => {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
                previewVideo.srcObject = screenStream;
                previewVideo.style.display = 'block';
                streamStatus.textContent = 'ROBLOX CONNECTED';
                streamStatus.style.color = '#4ade80';
                startCaptureBtn.textContent = '🛑 PUTUS KONEKSI RADAR';
                startAutoRadar();
            } catch (err) { alert('Screen capture ditolak/gagal.'); }
        });

        function startAutoRadar() {
            setInterval(async () => {
                if (!screenStream || !screenStream.active || state.mode !== 'rogaruda') return;
                welcomeScreen.style.display = 'none';
                appendMsg('ai', '🎯 *[RoGaruda Radar]* Memindai perubahan layar Roblox matematika...');
                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: "Deteksi otomatis tangkapan layar game matematika Roblox terbaru. Berikan kunci jawaban tercepat!", mode: 'rogaruda' })
                    });
                    const data = await res.json();
                    appendMsg('ai', data.reply);
                } catch (e) {}
            }, 8000);
        }

        document.getElementById('menuBtn').addEventListener('click', () => { sidebar.classList.add('open'); sidebarOverlay.classList.add('open'); renderHistoryTabs(); });
        document.getElementById('closeSidebar').addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);
        function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('open'); }

        document.getElementById('clearMemoryBtn').addEventListener('click', () => {
            state.memory = []; state.sessions = []; localStorage.clear();
            updateMemCount(); renderHistoryTabs(); chatArea.innerHTML = ''; chatArea.appendChild(welcomeScreen);
            welcomeScreen.style.display = 'flex'; showToast('Memori dihapus'); closeSidebar();
        });

        document.getElementById('newChatBtn').addEventListener('click', () => {
            archiveCurrentSession(); state.memory = []; localStorage.removeItem('garuda_mem');
            chatArea.innerHTML = ''; chatArea.appendChild(welcomeScreen);
            welcomeScreen.style.display = 'flex'; updateMemCount(); renderHistoryTabs(); closeSidebar();
        });

        document.getElementById('exportChat').addEventListener('click', () => {
            if (state.memory.length === 0) return;
            const msgs = state.memory.map(m => `[${m.role.toUpperCase()}]: ${m.content}`).join('\n\n');
            const blob = new Blob([msgs], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `chat-${Date.now()}.txt`; a.click();
        });

        function archiveCurrentSession() {
            if (state.memory.length === 0) return;
            const title = state.memory[0].content.substring(0, 20) + '...';
            state.sessions.unshift({ id: 's_'+Date.now(), title, timestamp: new Date().toLocaleTimeString(), data: [...state.memory] });
            localStorage.setItem('garuda_sessions', JSON.stringify(state.sessions));
        }

        function renderHistoryTabs() {
            historyListContainer.innerHTML = '';
            if (state.sessions.length === 0) { historyListContainer.innerHTML = '<div style="color:#555; font-size:11px;">Kosong</div>'; return; }
            state.sessions.forEach(sess => {
                const div = document.createElement('div'); div.className = 'history-item';
                div.innerHTML = `<div>${sess.title}</div>`;
                div.addEventListener('click', () => {
                    state.memory = sess.data; localStorage.setItem('garuda_mem', JSON.stringify(state.memory));
                    welcomeScreen.style.display = 'none'; chatArea.innerHTML = ''; restoreMemory(); updateMemCount(); closeSidebar();
                });
                historyListContainer.appendChild(div);
            });
        }

        function restoreMemory() {
            state.memory.forEach(m => appendMsg(m.role === 'user' ? 'user' : 'ai', m.content, false));
        }

        async function handleSend() {
            const text = userInput.value.trim(); if (!text || state.typing) return;
            welcomeScreen.style.display = 'none'; userInput.value = ''; sendBtn.disabled = true; state.typing = true;
            appendMsg('user', text);
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, memory: state.memory.slice(-6), mode: state.mode })
                });
                const data = await res.json();
                const reply = data.reply || 'Gangguan sistem.';
                appendMsg('ai', reply);
                state.memory.push({ role: 'user', content: text }, { role: 'assistant', content: reply });
                localStorage.setItem('garuda_mem', JSON.stringify(state.memory)); updateMemCount();
            } catch (err) { appendMsg('ai', '⚠️ Gateway Timeout.'); }
            state.typing = false;
        }

        function appendMsg(role, text) {
            const row = document.createElement('div'); row.className = `msg-row ${role}`;
            const avatar = role === 'ai' ? `<img src="${AVATAR_URL}">` : 'U';
            row.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble"><div class="msg-name">${role==='ai'?'GARUDA':'ANDA'}</div><div class="msg-content">${text}</div></div>`;
            chatArea.appendChild(row); chatArea.scrollTop = chatArea.scrollHeight;
            return row;
        }
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function updateMemCount() { memCount.textContent = Math.floor(state.memory.length / 2); }
    </script>
</body>
</html>
