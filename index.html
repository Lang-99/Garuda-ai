<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .typing { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: white; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body class="bg-zinc-950 text-white h-screen flex flex-col">
    <header class="p-4 border-b border-zinc-800 text-center font-bold text-blue-500">GARUDA AI</header>
    <main id="chatArea" class="flex-1 overflow-y-auto p-4 space-y-4"></main>
    <form id="chatForm" class="p-4 bg-zinc-900 border-t border-zinc-800">
        <div class="flex gap-2 max-w-3xl mx-auto">
            <input type="text" id="userInput" class="flex-1 bg-zinc-800 rounded p-2 outline-none" placeholder="Tanya sesuatu..." required>
            <button type="submit" class="bg-blue-600 px-6 py-2 rounded font-bold">Kirim</button>
        </div>
    </form>

    <script>
        const chatArea = document.getElementById('chatArea');
        const form = document.getElementById('chatForm');
        const input = document.getElementById('userInput');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const message = input.value;
            chatArea.innerHTML += `<div class="p-2 bg-zinc-800 rounded self-end"><b>Anda:</b> ${message}</div>`;
            input.value = '';

            const loading = document.createElement('div');
            loading.innerHTML = `<div>Garuda: <span class="typing"></span></div>`;
            chatArea.appendChild(loading);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                loading.innerHTML = `<div><b>Garuda:</b> ${data.reply || data.error || 'Error tidak diketahui'}</div>`;
            } catch (err) {
                loading.innerHTML = `<div>Error: Koneksi gagal.</div>`;
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        };
    </script>
</body>
</html>
