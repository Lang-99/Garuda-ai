<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Garuda AI | System Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0a0a0a; --bg2: #111111; --surface: rgba(255,255,255,0.04); --surface2: rgba(255,255,255,0.07); --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14); --accent: #e8ff47; --accent2: #7df9ff; --accent3: #ff6b35; --text: #f0f0f0; --text2: #888; --text3: #555; --radius: 16px; --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; }
        body { font-family: var(--sans); background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; position: relative; }
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
        .bg-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; opacity: 0.12; background: radial-gradient(circle, var(--accent2), transparent 70%); top: -200px; right: -200px; animation: glowFloat 8s ease-in-out infinite; }
        .bg-glow2 { position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; opacity: 0.08; background: radial-gradient(circle, var(--accent), transparent 70%); bottom: 0; left: -100px; animation: glowFloat 10s ease-in-out infinite reverse; }
        @keyframes glowFloat { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(30px) scale(1.05); } }
        .app-wrapper { position: relative; z-index: 1; width: 100%; max-width: 720px; height: 100%; display: flex; flex-direction: column; }
        header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); flex-shrink: 0; animation: slideDown 0.5s both; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .logo-group { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text { display: flex; flex-direction: column; gap: 1px; }
        .logo-name { font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--text); }
        .logo-status { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text3); font-family: var(--mono); }
        .status-dot { width: 5px; height: 5px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 6px #4ade80; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .icon-btn:hover { background: var(--surface2); color: var(--text); }
        .icon-btn svg { width: 15px; height: 15px; }
        .model-tag { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-family: var(--mono); font-size: 10px; color: var(--text2); letter-spacing: 0.05em; cursor: pointer; }
        .model-tag:hover { border-color: var(--accent); color: var(--accent); }
        .model-dot { width: 6px; height: 6px; background: var(--accent2); border-radius: 50%; }
        #chatArea { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        #chatArea::-webkit-scrollbar { width: 3px; }
        #chatArea::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 40px 20px; animation: fadeUp 0.8s both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .welcome-logo { width: 64px; height: 64px; border-radius: 18px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(125,249,255,0.2); border: 1px solid var(--border2); }
        .welcome-logo img { width: 100%; height: 100%; object-fit: cover; }
        .welcome-title { font-family: var(--mono); font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%); -webkit-background-clip: text; text-align: center; color: var(--text); }
        .welcome-sub { font-size: 14px; color: var(--text3); text-align: center; max-width: 300px; line-height: 1.6; }
        .suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 480px; }
        .suggestion-card { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.2s; }
        .suggestion-card:hover { border-color: var(--border2); background: var(--surface2); }
        .suggestion-icon { font-size: 16px; margin-bottom: 6px; }
        .suggestion-text { font-size: 12px; color: var(--text2); line-height: 1.4; }
        .msg-row { display: flex; gap: 12px; animation: msgIn 0.4s both; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .msg-row.user { flex-direction: row-reverse; }
        .msg-avatar { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); overflow: hidden; }
        .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .msg-avatar.user-av { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); font-weight: 700; }
        .msg-bubble { max-width: calc(100% - 50px); display: flex; flex-direction: column; gap: 6px; }
        .msg-name { font-family: var(--mono); font-size: 10px; color: var(--text3); }
        .msg-row.user .msg-name { text-align: right; }
        .msg-content { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.65; word-break: break-word; }
        .msg-row.ai .msg-content { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 4px 12px 12px 12px; }
        .msg-row.user .msg-content { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 12px 4px 12px 12px; align-self: flex-end; }
        .msg-meta { display: flex; align-items: center; gap: 8px; }
        .msg-row.user .msg-meta { justify-content: flex-end; }
        .msg-time { font-family: var(--mono); font-size: 9px; color: var(--text3); }
        .msg-actions { display: flex; gap: 4px; }
        .msg-action-btn { width: 22px; height: 22px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--text3); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; font-size: 10px; }
        .msg-action-btn:hover { color: var(--text); background: var(--surface2); }
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
        .typing-dot { width: 6px; height: 6px; background: var(--text3); border-radius: 50%; animation: typingBounce 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }
        footer { padding: 12px 16px 20px; flex-shrink: 0; border-top: 1px solid var(--border); background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); }
        .toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; overflow-x: auto; }
        .tool-chip { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-family: var(--mono); font-size: 10px; color: var(--text2); cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .tool-chip:hover, .tool-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.05); }
        .tool-chip svg { width: 11px; height: 11px; }
        .input-box { display: flex; align-items: flex-end; gap: 10px; padding: 10px 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); transition: border-color 0.2s; }
        .input-box:focus-within { border-color: rgba(232,255,71,0.3); }
        #userInput { flex: 1; background: transparent; border: none; outline: none; font-family: var(--sans); font-size: 14px; color: var(--text); resize: none; line-height: 1.5; max-height: 120px; overflow-y: auto; }
        #sendBtn { width: 34px; height: 34px; border-radius: 9px; border: none; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        #sendBtn:hover { transform: scale(1.05); }
        #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
        #sendBtn svg { width: 16px; height: 16px; }
        .sidebar { position: fixed; top: 0; right: 0; width: 280px; height: 100%; background: #111; border-left: 1px solid var(--border); z-index: 100; transform: translateX(100%); transition: transform 0.35s; display: flex; flex-direction: column; padding: 20px; gap: 20px; overflow-y: auto; }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.35s; }
        .sidebar-overlay.open { opacity: 1; pointer-events: all; }
        .sidebar-item { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
        .sidebar-item:hover { color: var(--text); background: var(--surface2); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); padding: 10px 18px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border2); font-family: var(--mono); font-size: 11px; color: var(--text); opacity: 0; transition: all 0.3s; z-index: 200; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .generated-image-box { margin-top: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border2); background: #000; position: relative; max-width: 100%; display: flex; flex-direction: column; }
        .generated-image-box img { width: 100%; height: auto; display: block; object-fit: contain; }
        .download-photo-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; background: var(--accent); color: #000; font-family: var(--mono); font-weight: 700; font-size: 11px; text-decoration: none; transition: background 0.2s; }
        .download-photo-btn:hover { background: #d4ec34; }
        .history-container { display: flex; flex-direction: column; gap: 6px; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="bg-glow2"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><span class="sidebar-title">SISTEM</span></div>
        <div class="sidebar-section">
            <div class="sidebar-label">Riwayat</div>
            <div class="history-container" id="historyListContainer"></div>
        </div>
        <div class="sidebar-item" id="clearMemoryBtn">🗑️ Hapus Memori</div>
    </div>
    <div class="app-wrapper">
        <header>
            <div class="logo-group">
                <div class="logo-icon"><img src="https://kappa.lol/8AK3HC" alt="G"></div>
                <div class="logo-text"><div class="logo-name">GARUDA AI</div></div>
            </div>
            <button class="icon-btn" id="menuBtn">☰</button>
        </header>
        <div id="chatArea">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-logo"><img src="https://kappa.lol/8AK3HC" alt="G"></div>
                <div class="welcome-title">Garuda AI</div>
                <div class="suggestions">
                    <div class="suggestion-card" data-text="Generate foto Elang Jawa asli">🎨 Generate Elang Jawa</div>
                    <div class="suggestion-card" data-text="Siapa yang membuat kamu?">🧠 Siapa pembuatmu?</div>
                </div>
            </div>
        </div>
        <footer>
            <div class="toolbar">
                <div class="tool-chip active" data-mode="chat">CHAT</div>
                <div class="tool-chip" data-mode="search">FOTO</div>
            </div>
            <div class="input-box">
                <textarea id="userInput" placeholder="Masukkan perintah..." rows="1"></textarea>
                <button id="sendBtn" disabled>▶</button>
            </div>
        </footer>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const state = { memory: JSON.parse(localStorage.getItem('garuda_mem')) || [], mode: 'chat', typing: false };
        const AVATAR_URL = "https://kappa.lol/8AK3HC";
        const chatArea = document.getElementById('chatArea');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        if (state.memory.length > 0) { welcomeScreen.style.display = 'none'; restoreMemory(); }

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto'; userInput.style.height = userInput.scrollHeight + 'px';
            sendBtn.disabled = userInput.value.trim().length === 0;
        });

        sendBtn.addEventListener('click', handleSend);

        document.querySelectorAll('.suggestion-card').forEach(card => {
            card.addEventListener('click', () => { userInput.value = card.dataset.text; handleSend(); });
        });

        document.querySelectorAll('.tool-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.tool-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active'); state.mode = chip.dataset.mode;
            });
        });

        document.getElementById('menuBtn').addEventListener('click', () => { sidebar.classList.add('open'); sidebarOverlay.classList.add('open'); });
        sidebarOverlay.addEventListener('click', () => { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('open'); });
        
        document.getElementById('clearMemoryBtn').addEventListener('click', () => {
            state.memory = []; localStorage.removeItem('garuda_mem');
            chatArea.innerHTML = ''; chatArea.appendChild(welcomeScreen);
            welcomeScreen.style.display = 'flex'; showToast('Memori dihapus ✓');
        });

        // PERBAIKAN LOGIKA RESTORE MEMORY AMAN DARI PROVIDER ERROR
        function restoreMemory() {
            state.memory.forEach(m => {
                if (m.role === 'user') { appendMsg('user', m.content, false); }
                else if (m.role === 'assistant') {
                    const imgMatch = m.content.match(/\|\|img_url:(.*?)\|\|/);
                    let cleanContent = m.content; let extractedImgUrl = null;
                    if (imgMatch) { extractedImgUrl = imgMatch[1]; cleanContent = m.content.replace(/\|\|img_url:.*?\|\|/, '').trim(); }
                    appendMsg('ai', cleanContent, false, extractedImgUrl);
                }
            });
        }

        // PERBAIKAN HANDLE SEND DENGAN INTEGRASI "TEXT-IMAGE SAFE STORAGE"
        async function handleSend() {
            const text = userInput.value.trim(); if (!text || state.typing) return;
            welcomeScreen.style.display = 'none'; userInput.value = ''; userInput.style.height = 'auto';
            sendBtn.disabled = true; state.typing = true;
            appendMsg('user', text); const typingEl = appendTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, memory: state.memory.slice(-10), mode: state.mode })
                });
                const data = await res.json(); typingEl.remove();
                const reply = data.reply || data.error || 'Sistem gangguan.';
                const imgUrl = data.generated_image || null;
                appendMsg('ai', reply, true, imgUrl);
                
                // SIMPAN MEMORY DENGAN FORMAT AMAN TEXT-IMAGE
                let assistantContent = reply; if (imgUrl) assistantContent += ` ||img_url:${imgUrl}||`;
                state.memory.push({ role: 'user', content: text }, { role: 'assistant', content: assistantContent });
                localStorage.setItem('garuda_mem', JSON.stringify(state.memory));
            } catch (err) { typingEl.remove(); appendMsg('ai', '⚠️ Gangguan API.'); }
            state.typing = false;
        }

        function appendMsg(role, text, animate = true, imageUrl = null) {
            const row = document.createElement('div'); row.className = `msg-row ${role}`;
            let imageHtml = ''; if (imageUrl) imageHtml = `<div class="generated-image-box"><img src="${imageUrl}"><a href="${imageUrl}" target="_blank" download="garuda-photo.jpg" class="download-photo-btn">📥 DOWNLOAD</a></div>`;
            const avatar = role === 'ai' ? `<img src="${AVATAR_URL}">` : 'U';
            row.innerHTML = `<div class="msg-avatar ${role === 'ai' ? 'ai' : 'user-av'}">${avatar}</div><div class="msg-bubble"><div class="msg-content">${text} ${imageHtml}</div></div>`;
            chatArea.appendChild(row); chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: animate ? 'smooth' : 'auto' });
            return row;
        }
        function appendTyping() { const row = document.createElement('div'); row.className = 'msg-row ai'; row.innerHTML = `<div class="msg-avatar ai"><img src="${AVATAR_URL}"></div><div class="msg-bubble"><div class="typing-indicator"><div></div><div></div><div></div></div></div>`; chatArea.appendChild(row); chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' }); return row; }
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }
    </script>
</body>
</html>
