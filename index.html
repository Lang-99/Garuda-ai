<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white h-screen flex flex-col">
    <header class="p-4 border-b border-zinc-800 text-center font-bold text-xl text-blue-500">GARUDA AI</header>
    <main id="chatArea" class="flex-1 overflow-y-auto p-4 space-y-4"></main>
    <form id="chatForm" class="p-4 border-t border-zinc-800 bg-zinc-900">
        <div class="flex gap-2">
            <input type="text" id="userInput" class="flex-1 bg-black border border-zinc-700 rounded p-2 outline-none" placeholder="Tanya sesuatu..." required>
            <button type="submit" class="bg-blue-600 px-4 py-2 rounded">Kirim</button>
        </div>
    </form>

    <script>
        const form = document.getElementById('chatForm');
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chatArea');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value;
            chat.innerHTML += `<div class="text-right"><b>Anda:</b> ${text}</div>`;
            input.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                chat.innerHTML += `<div class="text-left"><b>Garuda:</b> ${data.reply || data.error}</div>`;
            } catch (err) {
                chat.innerHTML += `<div class="text-red-500">Error: Koneksi gagal</div>`;
            }
        };
    </script>
</body>
</html>
